name: CI/CD

on:
  push:
    branches: [main, staging, develop]
    paths-ignore:
      - 'kubernetes/overlays/**/kustomization.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write        # OIDC → AWS
  contents: write        # push kustomization.yaml image-tag updates
  security-events: write # upload Trivy SARIF to GitHub Security tab

env:
  AWS_REGION: us-east-1
  ECR_REPO_SERVER: pm-server
  ECR_REPO_CLIENT: pm-client

jobs:
  # ─── Build & Push ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CI }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          TAG="${{ github.ref_name }}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_SERVER }}:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_SERVER }}:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build & push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_CLIENT }}:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_CLIENT }}:latest
          build-args: VITE_API_URL=/api
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  # ─── Trivy Security Scan ──────────────────────────────────────────────────
  trivy-scan:
    name: Trivy scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: server
            repo: pm-server
          - service: client
            repo: pm-client

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CI }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan ${{ matrix.service }} for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.ecr_registry }}/${{ matrix.repo }}:${{ needs.build-and-push.outputs.image_tag }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ─── GitOps Update ────────────────────────────────────────────────────────
  gitops-update:
    name: Update Kustomize overlay
    runs-on: ubuntu-latest
    needs: [build-and-push, trivy-scan]

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Determine target overlay
        id: env
        run: |
          case "${{ github.ref_name }}" in
            main)    echo "overlay=staging" >> "$GITHUB_OUTPUT" ;;
            staging) echo "overlay=staging" >> "$GITHUB_OUTPUT" ;;
            *)       echo "overlay=dev"     >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Update image tags in Kustomize overlay
        env:
          REGISTRY: ${{ needs.build-and-push.outputs.ecr_registry }}
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
          OVERLAY: ${{ steps.env.outputs.overlay }}
        run: |
          cd kubernetes/overlays/$OVERLAY
          kustomize edit set image \
            pm-server=$REGISTRY/${{ env.ECR_REPO_SERVER }}:$TAG \
            pm-client=$REGISTRY/${{ env.ECR_REPO_CLIENT }}:$TAG

      - name: Commit & push updated manifests
        env:
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
          OVERLAY: ${{ steps.env.outputs.overlay }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/overlays/$OVERLAY/kustomization.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(deploy): update $OVERLAY images to $TAG"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
