###############################################################################
# CI Pipeline — Build → Push to ECR → Update k8s manifests → ArgoCD deploys
#
# This pipeline is CI only. CD is handled by ArgoCD (GitOps):
#   1. `build-server` and `build-client` run in parallel — build Docker images
#      and push to ECR with an immutable sha-<short-sha> tag.
#   2. `update-manifests` runs after both builds — uses `kustomize edit set image`
#      to write the new image tags into k8s/kustomization.yaml, then commits
#      and pushes the change back to main with [skip ci] to avoid a loop.
#   3. ArgoCD detects the new commit, diffs against cluster state, and
#      performs a rolling update automatically.
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN        IAM role ARN assumed via OIDC
#                       e.g. arn:aws:iam::123456789012:role/github-actions-ecr
#   AWS_REGION          AWS region  (e.g. us-east-1)
#   ECR_REGISTRY        ECR registry hostname
#                       e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com
#   VITE_API_URL        API URL baked into the client JS bundle at build time
#                       e.g. https://app.yourdomain.com/api
#
# Note: EKS_CLUSTER_NAME is no longer needed — ArgoCD handles all kubectl ops.
#
# One-time IAM / OIDC setup — see comment block at the bottom of this file.
###############################################################################

name: CI

on:
  push:
    branches: [main]

# Prevent concurrent runs on the same branch from stepping on each other
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write   # OIDC token for AWS
  contents: write   # Needed for the manifest-update commit

env:
  SERVER_IMAGE: ${{ secrets.ECR_REGISTRY }}/project-mgmt-server
  CLIENT_IMAGE: ${{ secrets.ECR_REGISTRY }}/project-mgmt-client

jobs:
  # ── Compute shared image tag ─────────────────────────────────────────────────
  setup:
    name: Compute image tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute SHA tag
        id: tag
        run: echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  # ── Build & Push: Server ─────────────────────────────────────────────────────
  build-server:
    name: Build & Push Server
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ needs.setup.outputs.image_tag }}
            ${{ env.SERVER_IMAGE }}:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  # ── Build & Push: Client ─────────────────────────────────────────────────────
  build-client:
    name: Build & Push Client
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          # VITE_API_URL is baked into the JS bundle at build time — not in logs
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.CLIENT_IMAGE }}:${{ needs.setup.outputs.image_tag }}
            ${{ env.CLIENT_IMAGE }}:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  # ── Update k8s manifests → ArgoCD takes over ─────────────────────────────────
  update-manifests:
    name: Update image tags in kustomization
    runs-on: ubuntu-latest
    needs: [setup, build-server, build-client]

    steps:
      - name: Checkout (with write access)
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — sufficient for same-repo pushes
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch the latest commit so the push doesn't conflict
          ref: main

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.3.0"

      - name: Update server image tag
        run: |
          cd k8s
          kustomize edit set image \
            project-mgmt-server=${{ env.SERVER_IMAGE }}:${{ needs.setup.outputs.image_tag }}

      - name: Update client image tag
        run: |
          cd k8s
          kustomize edit set image \
            project-mgmt-client=${{ env.CLIENT_IMAGE }}:${{ needs.setup.outputs.image_tag }}

      - name: Commit and push updated kustomization
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git diff --staged --quiet && echo "No image tag changes, skipping commit." && exit 0
          git commit -m "ci: update images to ${{ needs.setup.outputs.image_tag }} [skip ci]"
          git push origin main

      # ArgoCD detects the new commit via webhook or polling and syncs automatically.
      # No kubectl needed here.

###############################################################################
# One-time IAM / OIDC setup (run once before the first pipeline run):
#
# 1. Create GitHub OIDC provider in IAM (skip if already exists):
#    aws iam create-open-id-connect-provider \
#      --url https://token.actions.githubusercontent.com \
#      --client-id-list sts.amazonaws.com \
#      --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1
#
# 2. Create an IAM role with this trust policy (replace <ACCOUNT>, <ORG>, <REPO>):
#    {
#      "Version": "2012-10-17",
#      "Statement": [{
#        "Effect": "Allow",
#        "Principal": {
#          "Federated": "arn:aws:iam::<ACCOUNT>:oidc-provider/token.actions.githubusercontent.com"
#        },
#        "Action": "sts:AssumeRoleWithWebIdentity",
#        "Condition": {
#          "StringEquals": {
#            "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
#          },
#          "StringLike": {
#            "token.actions.githubusercontent.com:sub": "repo:<ORG>/<REPO>:ref:refs/heads/main"
#          }
#        }
#      }]
#    }
#
# 3. Attach to the role:
#    - AmazonEC2ContainerRegistryPowerUser  (ECR push access)
#
# 4. Set AWS_ROLE_ARN secret in GitHub → Settings → Secrets and variables → Actions
###############################################################################
