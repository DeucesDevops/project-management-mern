name: Build & Deploy — Project Management App

on:
  push:
    branches: [main, staging, develop]
    paths:
      - 'server/**'
      - 'client/**'
  pull_request:
    branches: [main, staging]
    paths:
      - 'server/**'
      - 'client/**'

env:
  AWS_REGION: us-east-1
  ECR_REPO_SERVER: pm-server
  ECR_REPO_CLIENT: pm-client

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install & test server
        working-directory: server
        run: |
          npm ci
          npm run lint
          npm test -- --coverage

      - name: Install & test client
        working-directory: client
        run: |
          npm ci
          npm run lint
          npm run build   # Catches build errors early

  # ── Build Docker images & push to ECR ────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      server_image: ${{ steps.push.outputs.server_image }}
      client_image: ${{ steps.push.outputs.client_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CI }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          BRANCH=${{ github.ref_name }}
          TAG="${BRANCH}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Build & push server image
        id: push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          # Build server
          docker build \
            --target production \
            --cache-from $ECR_REGISTRY/$ECR_REPO_SERVER:latest \
            --tag $ECR_REGISTRY/$ECR_REPO_SERVER:$TAG \
            --tag $ECR_REGISTRY/$ECR_REPO_SERVER:latest \
            ./server

          # Build client
          docker build \
            --target production \
            --build-arg VITE_API_URL=/api \
            --cache-from $ECR_REGISTRY/$ECR_REPO_CLIENT:latest \
            --tag $ECR_REGISTRY/$ECR_REPO_CLIENT:$TAG \
            --tag $ECR_REGISTRY/$ECR_REPO_CLIENT:latest \
            ./client

          # Push both
          docker push $ECR_REGISTRY/$ECR_REPO_SERVER:$TAG
          docker push $ECR_REGISTRY/$ECR_REPO_SERVER:latest
          docker push $ECR_REGISTRY/$ECR_REPO_CLIENT:$TAG
          docker push $ECR_REGISTRY/$ECR_REPO_CLIENT:latest

          echo "server_image=$ECR_REGISTRY/$ECR_REPO_SERVER:$TAG" >> $GITHUB_OUTPUT
          echo "client_image=$ECR_REGISTRY/$ECR_REPO_CLIENT:$TAG" >> $GITHUB_OUTPUT

      # ── Security scan with Trivy ────────────────────────────────────────────
      - name: Scan server image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.push.outputs.server_image }}
          format: sarif
          output: trivy-server.sarif
          severity: CRITICAL,HIGH
          exit-code: 1           # Fail pipeline on CRITICAL/HIGH CVEs

      - name: Scan client image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.push.outputs.client_image }}
          format: sarif
          output: trivy-client.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-server.sarif

  # ── Update GitOps repo with new image tag ────────────────────────────────────
  # ArgoCD detects the change and auto-deploys to dev/staging
  update-gitops:
    name: Update GitOps manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine target overlay
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "overlay=staging" >> $GITHUB_OUTPUT
          else
            echo "overlay=dev" >> $GITHUB_OUTPUT
          fi

      - name: Update image tags in Kustomize overlay
        env:
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
          OVERLAY: ${{ steps.env.outputs.overlay }}
        run: |
          cd kubernetes/overlays/$OVERLAY

          # Use kustomize to set the new image tag (avoids manual sed)
          kustomize edit set image \
            YOUR_ECR_REPO/pm-server=YOUR_ECR_REPO/pm-server:$TAG \
            YOUR_ECR_REPO/pm-client=YOUR_ECR_REPO/pm-client:$TAG

      - name: Commit & push updated manifests
        env:
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
          OVERLAY: ${{ steps.env.outputs.overlay }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/overlays/$OVERLAY/kustomization.yaml
          git commit -m "chore(deploy): update $OVERLAY images to $TAG [skip ci]"
          git push
