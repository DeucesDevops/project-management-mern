apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: project-management-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
  labels:
    app.kubernetes.io/name: project-management
    environment: staging
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: devops-alerts
    notifications.argoproj.io/subscribe.on-sync-failed.slack: devops-alerts
    notifications.argoproj.io/subscribe.on-health-degraded.slack: devops-alerts
spec:
  project: apps

  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/eks-gitops-platform
    targetRevision: HEAD
    path: kubernetes/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: app-project-management

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
