apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: app-project-management
  labels:
    app: server
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: server
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5001"
        prometheus.io/path: "/api/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: server
          image: YOUR_ECR_REPO/pm-server:latest   # replaced by CI pipeline
          ports:
            - containerPort: 5001
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5001"
            - name: MONGO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: MONGO_ROOT_USER
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: MONGO_ROOT_PASSWORD
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: MONGO_DB
            - name: MONGO_URI
              value: "mongodb://$(MONGO_ROOT_USER):$(MONGO_ROOT_PASSWORD)@mongodb-svc:27017/$(MONGO_DB)?authSource=admin"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: JWT_SECRET
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-svc:6379"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
