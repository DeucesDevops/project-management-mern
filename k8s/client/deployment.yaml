###############################################################################
# Client — Deployment
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: project-mgmt
  labels:
    app: client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: client
    spec:
      terminationGracePeriodSeconds: 30

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: client

      # nginx:stable-alpine runs as uid 101
      securityContext:
        runAsNonRoot: true
        runAsUser: 101

      containers:
        - name: client
          # Image name matches kustomization.yaml `images[].name`
          # kustomize edit set image will substitute full ECR URL + SHA tag
          image: project-mgmt-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80

          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          startupProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10

          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
