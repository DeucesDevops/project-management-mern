###############################################################################
# NetworkPolicies — default-deny then allow only required traffic
###############################################################################

# Default deny all ingress/egress in the namespace
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: project-mgmt
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# Allow DNS egress for all pods (required before any other egress works)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: project-mgmt
spec:
  podSelector: {}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
  policyTypes:
    - Egress

# ── Client ────────────────────────────────────────────────────────────────────

# Allow ALB → client ingress (ALB uses target-type: ip, arrives from VPC CIDR)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-client
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: client
  ingress:
    - ports:
        - port: 80
  policyTypes:
    - Ingress

# Allow client egress to server only
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-client-egress
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: client
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: server
      ports:
        - port: 5001
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
  policyTypes:
    - Egress

# ── Server ────────────────────────────────────────────────────────────────────

# Allow ALB → server ingress (from any source — ALB IPs are from VPC CIDR)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-server
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: server
  ingress:
    - ports:
        - port: 5001
  policyTypes:
    - Ingress

# Allow server egress: in-cluster MongoDB, in-cluster Redis, external MongoDB Atlas, DNS
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-egress
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: server
  egress:
    # In-cluster MongoDB
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - port: 27017
    # In-cluster Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # External MongoDB Atlas (and other MongoDB-compatible services)
    - ports:
        - port: 27017
          protocol: TCP
    # External HTTPS (Atlas control plane, third-party APIs)
    - ports:
        - port: 443
          protocol: TCP
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
  policyTypes:
    - Egress

# ── MongoDB ───────────────────────────────────────────────────────────────────

# Allow server → mongodb ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-to-mongodb
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: mongodb
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: server
      ports:
        - port: 27017
  policyTypes:
    - Ingress

# ── Redis ─────────────────────────────────────────────────────────────────────

# Allow server → redis ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-to-redis
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: redis
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: server
      ports:
        - port: 6379
  policyTypes:
    - Ingress
