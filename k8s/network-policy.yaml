###############################################################################
# NetworkPolicies — default-deny then allow only required traffic
###############################################################################

# Default deny all ingress/egress in the namespace
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: project-mgmt
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# Allow client → server on port 5001 (via nginx proxy)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-client-to-server
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: server
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: client
      ports:
        - port: 5001
  policyTypes:
    - Ingress

# Allow ALB health-check + ingress traffic to client
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-client
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: client
  ingress:
    - ports:
        - port: 80
  policyTypes:
    - Ingress

# Allow ALB health-check + ingress traffic to server
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-server
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: server
  ingress:
    - ports:
        - port: 5001
  policyTypes:
    - Ingress

# Allow server → mongodb
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-to-mongodb
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: mongodb
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: server
      ports:
        - port: 27017
  policyTypes:
    - Ingress

# Allow server → redis
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-to-redis
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: redis
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: server
      ports:
        - port: 6379
  policyTypes:
    - Ingress

# Allow DNS egress for all pods
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: project-mgmt
spec:
  podSelector: {}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
  policyTypes:
    - Egress

# Allow server egress to mongodb + redis + external (for MongoDB Atlas if needed)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-egress
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: server
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # Allow egress to kube-dns
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
  policyTypes:
    - Egress

# Allow client egress to server
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-client-egress
  namespace: project-mgmt
spec:
  podSelector:
    matchLabels:
      app: client
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: server
      ports:
        - port: 5001
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
  policyTypes:
    - Egress
