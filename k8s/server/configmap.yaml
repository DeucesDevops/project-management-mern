apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: project-mgmt
data:
  NODE_ENV: "production"
  PORT: "5001"
  LOG_LEVEL: "info"
  MONGO_DB: "project_management"
  # In-cluster MongoDB service hostname
  MONGO_HOST: "mongodb"
  MONGO_PORT: "27017"
  # In-cluster Redis service hostname
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
