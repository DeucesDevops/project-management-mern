###############################################################################
# Server Secret — TEMPLATE ONLY
# Do NOT commit real values. Create the actual secret imperatively:
#
#   kubectl create secret generic app-secrets \
#     --namespace project-mgmt \
#     --from-literal=JWT_SECRET='<min-32-char-random-string>' \
#     --from-literal=MONGO_ROOT_USER='admin' \
#     --from-literal=MONGO_ROOT_PASSWORD='<strong-password>' \
#     --from-literal=REDIS_PASSWORD='<strong-password>'
#
# To update later without downtime:
#   kubectl create secret generic app-secrets --namespace project-mgmt \
#     --from-literal=JWT_SECRET='...' ... \
#     --dry-run=client -o yaml | kubectl apply -f -
###############################################################################
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: project-mgmt
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_REAL_SECRET"
  MONGO_ROOT_USER: "REPLACE_WITH_REAL_USER"
  MONGO_ROOT_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"
  REDIS_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"
