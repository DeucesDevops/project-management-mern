apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: app-project-management
  labels:
    app: client
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: client
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101     # nginx default user
      containers:
        - name: client
          image: YOUR_ECR_REPO/pm-client:latest   # replaced by CI pipeline
          ports:
            - containerPort: 80
              name: http
          env:
            - name: VITE_API_URL
              value: /api                          # proxied by nginx to server-svc
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
