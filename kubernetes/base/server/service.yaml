---
apiVersion: v1
kind: Service
metadata:
  name: server-svc
  namespace: app-project-management
  labels:
    app: server
spec:
  selector:
    app: server
  ports:
    - port: 5001
      targetPort: 5001
      name: http
---
# Horizontal Pod Autoscaler — scales API pods on CPU/memory
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server-hpa
  namespace: app-project-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
