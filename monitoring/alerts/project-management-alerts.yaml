apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: project-management-alerts
  namespace: monitoring
  labels:
    release: monitoring   # matches kube-prometheus-stack label selector
spec:
  groups:
    - name: project-management.api
      rules:
        - alert: APIHighErrorRate
          expr: |
            sum(rate(http_requests_total{namespace="app-project-management", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{namespace="app-project-management"}[5m])) > 0.05
          for: 2m
          labels:
            severity: critical
            team: backend
          annotations:
            summary: "High API error rate"
            description: "More than 5% of requests returning 5xx for 2 minutes."

        - alert: APIHighLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{namespace="app-project-management"}[5m])) by (le)
            ) > 2
          for: 5m
          labels:
            severity: warning
            team: backend
          annotations:
            summary: "API p95 latency above 2s"
            description: "95th percentile response time exceeds 2 seconds."

        - alert: APIPodDown
          expr: |
            kube_deployment_status_replicas_available{
              namespace="app-project-management",
              deployment="server"
            } < 1
          for: 1m
          labels:
            severity: critical
            team: backend
          annotations:
            summary: "All API pods down"
            description: "No available server replicas in app-project-management."

    - name: project-management.database
      rules:
        - alert: MongoDBDown
          expr: |
            kube_statefulset_status_replicas_ready{
              namespace="app-project-management",
              statefulset="mongodb"
            } < 1
          for: 1m
          labels:
            severity: critical
            team: backend
          annotations:
            summary: "MongoDB StatefulSet has no ready replicas"
            description: "MongoDB is down — all dependent services will fail."

        - alert: RedisDown
          expr: |
            kube_statefulset_status_replicas_ready{
              namespace="app-project-management",
              statefulset="redis"
            } < 1
          for: 1m
          labels:
            severity: critical
            team: backend
          annotations:
            summary: "Redis StatefulSet has no ready replicas"
            description: "Redis is down — session management and caching unavailable."

        - alert: PersistentVolumeNearFull
          expr: |
            kubelet_volume_stats_available_bytes{namespace="app-project-management"}
            /
            kubelet_volume_stats_capacity_bytes{namespace="app-project-management"} < 0.15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} nearly full"
            description: "Less than 15% disk space remaining on volume."
